    <style>
      /* CRITICAL: TRANSPARENT BACKGROUND FOR ELECTRON OVERLAY */
      html,
      body {
        background-color: transparent;
        margin: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      /* Custom Scrollbar for Terminal */
      ::-webkit-scrollbar {
        width: 4px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.5);
      }

      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 0px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #ef4444;
      }

      /* Holographic Core Animations */
      .holo-ring {
        transform-style: preserve-3d;
        border-radius: 50%;
      }

      .holo-glow {
        box-shadow:
          0 0 20px currentColor,
          inset 0 0 20px currentColor;
      }

      /* Electron Draggable Region */
      .app-region-drag {
        -webkit-app-region: drag;
      }

      .app-region-no-drag {
        -webkit-app-region: no-drag;
      }

      /* 2050 Upgrade: Volumetric UI Effects */
      .transform-gpu {
        transform: translateZ(0);
        will-change: transform;
      }

      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }

        100% {
          background-position: 200% 0;
        }
      }
    </style>
