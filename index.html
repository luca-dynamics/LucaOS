    />

    />

    <link rel="apple-touch-icon" href="/icon.png" />
    <style>
      /* CRITICAL: TRANSPARENT BACKGROUND FOR ELECTRON OVERLAY */
      html,
      body {
        background-color: transparent;
        margin: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      /* Custom Scrollbar for Terminal */
      ::-webkit-scrollbar {
        width: 4px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.5);
      }

      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 0px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #ef4444;
      }

      /* Holographic Core Animations */
      .holo-ring {
        transform-style: preserve-3d;
        border-radius: 50%;
      }

      .holo-glow {
        box-shadow:
          0 0 20px currentColor,
          inset 0 0 20px currentColor;
      }

      /* Electron Draggable Region */
      .app-region-drag {
        -webkit-app-region: drag;
      }

      .app-region-no-drag {
        -webkit-app-region: no-drag;
      }

      /* 2050 Upgrade: Volumetric UI Effects */
      .transform-gpu {
        transform: translateZ(0);
        will-change: transform;
      }

      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }

        100% {
          background-position: 200% 0;
        }
      }
    </style>
    <!-- Import Map Removed for Local Vite Stability -->

    <link rel="stylesheet" href="/src/index.css" />
    <style>
      #root-loader {
        position: fixed;
        inset: 0;
        background: #09090b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: 'Inter', system-ui, sans-serif;
        color: #f5d679;
        transition: opacity 0.5s ease-out;
      }
      .loader-orb {
        width: 60px;
        height: 60px;
        border: 2px solid rgba(245, 214, 121, 0.1);
        border-top-color: #f5d679;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
        box-shadow: 0 0 30px rgba(245, 214, 121, 0.1);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loader-text {
        font-size: 10px;
        letter-spacing: 0.4em;
        font-weight: 900;
        text-transform: uppercase;
        opacity: 0.6;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
      }
    </style>
  </head>

  <body>
    <div id="root-loader">
      <div class="loader-orb"></div>
      <div class="loader-text">Initializing Luca OS</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
